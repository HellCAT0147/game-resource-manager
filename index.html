<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1116" />
  <title>Трекеры ресурсов — выбор игры</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-launcher">
  <main class="launcher">
    <div class="launcher-head">
      <h1>В какую игру играем?</h1>
      <p class="launcher-sub">Выбери игру — откроется её трекер ресурсов.</p>
    </div>

    <ul class="game-list">
      <li>
        <a class="game-card game-subnautica" href="subnautica.html" data-game="subnautica">
          <span class="game-icon">🌊</span>
          <span class="game-text">
            <span class="game-name">Subnautica 2</span>
            <span class="game-desc">Трекер собираемых ресурсов</span>
          </span>
          <span class="game-last">Продолжить</span>
          <span class="game-chevron">›</span>
        </a>
      </li>
      <li>
        <a class="game-card game-stalker" href="stalker.html" data-game="stalker">
          <span class="game-icon">☢️</span>
          <span class="game-text">
            <span class="game-name">S.T.A.L.K.E.R. 2</span>
            <span class="game-desc">Трекер ресурсов <span class="game-tag">в разработке</span></span>
          </span>
          <span class="game-last">Продолжить</span>
          <span class="game-chevron">›</span>
        </a>
      </li>
    </ul>

    <p class="launcher-foot">Данные каждой игры хранятся отдельно в этом браузере.</p>
  </main>

  <script src="launcher.js"></script>
</body>
</html>
